<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Book Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Book Store</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/">Home</a>
                </li>
               
                <li class="nav-item">
                    <a class="nav-link text-white" href="/available_books">
                        Available Books
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="/my_books">
                        My Books
                    </a>
                </li>
                <li class="nav-item"><a class="nav-link text-white" href="/dashboard"> Dashboard </a></li>
            </ul>

            <a class="nav-link text-white" href="/book_register">
                New Book Register
            </a>
        </div>
    </div>
</nav>


<div class="container my-5">

<h3 class="text-center mb-4">Available Books</h3>
<form th:action="@{/search}" method="get" class="mb-4">
<div class="input-group">

<input type="text"
name="keyword"
class="form-control"
placeholder="Search book by name">

<button class="btn btn-dark">
Search
</button>

</div>
</form>
<table class="table table-striped table-hover">
    <thead>
    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Author</th>
        <th>Price</th>
        <th>Add</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="b : ${book}">
        <td th:text="${b.id}"></td>
        <td th:text="${b.name}"></td>
        <td th:text="${b.author}"></td>
        <td th:text="${b.price}"></td>

        <td>
            <a th:href="@{/mylist/{id}(id=${b.id})}"
               class="btn btn-secondary btn-sm">
                Add to MyBook
            </a>
        </td>

        <td>
            <a th:href="@{/editBook/{id}(id=${b.id})}"
               class="btn btn-primary btn-sm">
                Edit
            </a>
        </td>

        <td>
            <a th:href="@{/deleteBook/{id}(id=${b.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Delete this book?')">
                Delete
            </a>
        </td>

    </tr>
    </tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
